<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../styles/login.css">
</head>

<body>
    <main>
        <h1>bem vindo de volta faça o login para continuar</h1>
        <div class="login">
            <label for="email">email:</label>
            <input type="email" id="emailInput" placeholder="digite seu email">
            <label for="password">senha:</label>
            <input type="password" id="passwordInput" placeholder="senha">
            <img onclick="showPassword()" src="../imgs/hidden.png" id="showPassword" width="20" class="clicable">
            <button class="center"><h3>avançar</h3></button>
        </div>
    </main>
    <script src="../js/login.js"></script>
</body>

</html>
